<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MK71TWZGL7"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-MK71TWZGL7');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主視覺介紹 | Introduction</title>
    <link rel="stylesheet" href="assets/css/styles.css?v007">
</head>

<body>
    <!-- Navigation Component -->
    <div id="nav-component"></div>

    <!-- Content Layout -->

    <section class="content-page">

        <div class="content-layout">
            <h1 class="page-heading" id="intro-page-heading">當季單元</h1>
            <div class="top-row">
                <div class="image-container">
                    <img id="main-image" src="" alt="Main Visual">
                </div>
                <div class="menu-wrapper">
                    <div class="menu-container">
                        <a href="intro.html?unit=permanent" class="menu-btn" data-unit="permanent" data-i18n="permanent_unit">常態單元</a>
                        <a href="intro.html?unit=seasonal" class="menu-btn" data-unit="seasonal" data-i18n="seasonal_unit">當季單元</a>
                        <div class="menu-divider"></div>
                        <a href="gallery.html?unit=seasonal" class="menu-btn enter-intro-btn"
                            data-i18n="enter_intro">進入介紹<img src="assets/images/enter_intro_btn/arrow.svg"> </a>
                    </div>
                </div>
            </div>
            <div class="hero-mobile-box">
                <div class="avatar"> </div>
                <div class="hero-mobile"></div>

                <div class="text-container">
                    <h2 id="content-title"></h2>
                <div class="text-content">
                    <p id="content-description"></p>
                </div>
                <div class="audio-player">
                    <button class="audio-btn" id="audio-btn"></button>
                    <!-- audio 元素已移至 index.html 統一管理 -->
                </div>
            </div>
            </div>
            <div class="top-row">
                <div class="menu-wrapper mobile">
                    <div class="menu-container">
                        <a href="intro.html?unit=permanent" class="menu-btn" data-unit="permanent"
                           data-i18n="permanent_unit">常態單元</a>
                        <a href="intro.html?unit=seasonal" class="menu-btn" data-unit="seasonal"
                           data-i18n="seasonal_unit">當季單元</a>
                        <div class="menu-divider"></div>
                        <a href="gallery.html?unit=seasonal" class="menu-btn enter-intro-btn"
                           data-i18n="enter_intro">進入介紹<img src="assets/images/enter_intro_btn/arrow.svg"> </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Back to Home Button -->
    <a href="home.html" class="back-home-btn" style="display: none" data-i18n="back_home">返回首頁</a>

    <script src="assets/js/common.js?v005"></script>
    <script src="assets/js/gallery.js?v005"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 從 URL 參數取得單元類型
            const urlParams = new URLSearchParams(window.location.search);
            const unit = urlParams.get('unit') || 'seasonal';

            // 單元類型對應的介紹 UnitType
            const introUnitType = unit === 'permanent' ? '常態單元主視覺' : '當季單元主視覺';

            // 設定頁面標題
            const titleConfig = {
                seasonal: { tw: '當季單元介紹', en: 'Seasonal Introduction' },
                permanent: { tw: '常態單元介紹', en: 'Permanent Introduction' }
            };
            const config = titleConfig[unit] || titleConfig.seasonal;
            document.title = `${config.tw} | ${config.en}`;

            // 頁面標題多語系配置
            const headingConfig = {
                seasonal: { tw: '當季單元', en: 'Current Program' },
                permanent: { tw: '常態單元', en: 'Year-Round Program' }
            };

            // 更新頁面標題
            function updatePageHeading() {
                const lang = getCurrentLang();
                const headingEl = document.getElementById('intro-page-heading');
                if (headingEl) {
                    const hConfig = headingConfig[unit] || headingConfig.seasonal;
                    headingEl.textContent = lang === 'tw' ? hConfig.tw : hConfig.en;
                }
            }

            // 初始化標題
            updatePageHeading();

            // 監聽語言切換
            document.addEventListener('languageChanged', updatePageHeading);

            // 設定選單 active 狀態 + GA4 追蹤
            document.querySelectorAll('.menu-btn[data-unit]').forEach(btn => {
                if (btn.dataset.unit === unit) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }

                // GA4 追蹤：選擇單元
                btn.addEventListener('click', () => {
                    if (typeof trackGA4Event !== 'undefined') {
                        trackGA4Event('select_unit', {
                            'unit_type': btn.dataset.unit
                        });
                    }
                });
            });

            // 更新「進入介紹」按鈕連結 + GA4 追蹤
            const enterBtns = document.querySelectorAll('.enter-intro-btn');
            enterBtns.forEach(enterBtn => {
                enterBtn.href = `gallery.html?unit=${unit}`;
                enterBtn.addEventListener('click', () => {
                    if (typeof trackGA4Event !== 'undefined') {
                        trackGA4Event('enter_intro', {
                            'unit_type': unit
                        });
                    }
                });
            });

            // 點擊 cover 圖片也跳轉到 gallery 頁面 + GA4 追蹤
            const mainImage = document.getElementById('main-image');
            if (mainImage) {
                mainImage.style.cursor = 'pointer';
                mainImage.addEventListener('click', () => {
                    if (typeof trackGA4Event !== 'undefined') {
                        trackGA4Event('enter_intro', {
                            'unit_type': unit,
                            'trigger': 'image_click'
                        });
                    }
                    window.location.href = `gallery.html?unit=${unit}`;
                });
            }

            initGallery(introUnitType);
        });
    </script>
</body>

</html>
